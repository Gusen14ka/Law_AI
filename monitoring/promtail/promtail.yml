server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://lex-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
        action: replace

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
        action: replace

      - source_labels: ['__meta_docker_container_log_path']
        target_label: __path__
        action: replace

      - target_label: job
        replacement: docker
        action: replace

    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time

      - output:
          source: log

      - labels:
          stream:

      - regex:
          expression: '(?i)(debug|info|warn|warning|error|critical)'
          source: log

      - timestamp:
          source: time
          format: RFC3339Nano
          action_on_failure: skip