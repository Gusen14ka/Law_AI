global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@lexanalytica.ru'
  smtp_auth_username: 'glebuschon2005@gmail.com'   # ← ЗАМЕНИТЬ
  smtp_auth_password: 'ibzx ssvt dgjt oijb'       # ← App Password из Google
  smtp_require_tls: true
  resolve_timeout: 5m

route:
  receiver: 'email-critical'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'email-warning'
      group_wait: 2m
      repeat_interval: 6h

receivers:
  - name: 'email-critical'
    email_configs:
      - to: 'faktur2005@yandex.ru'  # ← ЗАМЕНИТЬ
        headers:
          Subject: '🚨 [АВАРИЯ] {{ .GroupLabels.alertname }} — Lex Analytica'
        html: |
          <h2 style="color:red">🚨 АВАРИЯ В СИСТЕМЕ LEX ANALYTICA</h2>
          <hr>
          {{ range .Alerts }}
            <p><b>{{ .Annotations.summary }}</b></p>
            <pre>{{ .Annotations.description }}</pre>
            <p>Время: {{ .StartsAt.Format "02.01.2006 15:04:05" }}</p>
            <p>Статус: <b>{{ .Status }}</b> | Severity: {{ .Labels.severity }}</p>
            <hr>
          {{ end }}
          <p>
            <a href="http://localhost:3000">Grafana</a> |
            <a href="http://localhost:9090/alerts">Prometheus Alerts</a>
          </p>
        send_resolved: true

  - name: 'email-warning'
    email_configs:
      - to: 'faktur2005@yandex.ru'  # ← ЗАМЕНИТЬ
        headers:
          Subject: '⚠ [Предупреждение] {{ .GroupLabels.alertname }} — Lex Analytica'
        html: |
          <h3>⚠ Предупреждение Lex Analytica</h3>
          {{ range .Alerts }}
            <p><b>{{ .Annotations.summary }}</b></p>
            <p>{{ .Annotations.description }}</p>
            <p>Время: {{ .StartsAt.Format "02.01.2006 15:04:05" }}</p>
            <hr>
          {{ end }}
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
