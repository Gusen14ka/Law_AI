global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'lexanalytica'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['lex-alertmanager:9093']

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # FastAPI backend — метрики приложения
  - job_name: 'lex-backend'
    static_configs:
      - targets: ['lex-backend:8000']
        labels:
          service: 'backend'
          container: 'lex-backend'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # PostgreSQL
  - job_name: 'postgresql'
    static_configs:
      - targets: ['lex-postgres-exporter:9187']
        labels:
          service: 'database'
          container: 'lex-db'

  # Node (хостовая машина — CPU/RAM/диск)
  - job_name: 'node'
    static_configs:
      - targets: ['lex-node-exporter:9100']
        labels:
          service: 'host'

  # Prometheus сам себя
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'monitoring'

  # Ollama healthcheck через /api/tags
  - job_name: 'ollama-health'
    metrics_path: '/api/tags'
    static_configs:
      - targets: ['lex-ollama:11434']
        labels:
          service: 'ollama'
    # Превращаем HTTP-ответ в up/down метрику
    params: {}
    scheme: http
    relabel_configs:
      - target_label: __address__
        replacement: 'lex-ollama:11434'
