<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Юридический AI-помощник</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0e0e12;
    --bg2: #16161c;
    --bg3: #1e1e26;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e6f0;
    --text2: #9896a8;
    --text3: #5e5c6e;
    --accent: #7c6af7;
    --accent2: #9d8fff;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --red: #e05c5c;
    --orange: #e08a3c;
    --green: #4cae7e;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
  }

  .logo-icon {
    width: 40px; height: 40px;
    border: 1px solid var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text h1 {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--gold2);
    letter-spacing: 0.02em;
  }

  .logo-text p {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .main { flex: 1; max-width: 1100px; margin: 0 auto; width: 100%; padding: 40px; }

  /* Upload Zone */
  .upload-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 40px;
  }

  .upload-headline {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 400;
    color: var(--text);
    text-align: center;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .upload-headline span { color: var(--gold2); }

  .upload-sub {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 48px;
    max-width: 480px;
  }

  .drop-zone {
    width: 100%;
    max-width: 560px;
    border: 1.5px dashed var(--border2);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--bg2);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(124, 106, 247, 0.06);
  }

  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    width: 56px; height: 56px;
    border: 1px solid var(--border2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 24px;
    background: var(--bg3);
  }

  .drop-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .drop-sub { font-size: 12px; color: var(--text3); }
  .drop-formats {
    display: flex; gap: 8px; justify-content: center; margin-top: 20px;
  }
  .format-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 10px;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text3);
  }

  /* File selected state */
  .file-selected {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 20px;
    width: 100%;
    max-width: 560px;
    margin-top: 24px;
  }

  .file-icon { font-size: 28px; }
  .file-info { flex: 1; }
  .file-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .file-size { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .analyze-btn {
    margin-top: 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 40px;
    border-radius: 10px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .analyze-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Loading */
  .loading-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 40px;
    gap: 20px;
  }

  .spinner {
    width: 48px; height: 48px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-family: var(--serif); font-size: 20px; color: var(--text2); }
  .loading-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .loading-step {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.3s;
  }
  .loading-step.active { color: var(--accent2); }
  .loading-step.done { color: var(--green); }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Results */
  .results-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .results-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    color: var(--gold2);
    margin-bottom: 4px;
  }

  .results-meta { font-size: 12px; color: var(--text3); }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); }

  /* Cards grid */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 700px) {
    .results-grid { grid-template-columns: 1fr; }
    .main { padding: 20px; }
    header { padding: 16px 20px; }
    .upload-section { padding: 32px 0; }
    .upload-headline { font-size: 26px; }
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }

  .card-full { grid-column: 1 / -1; }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .card-value {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
  }

  .parties-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }

  .party-tag {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--text2);
    font-family: var(--mono);
  }

  /* Risks */
  .risks-list { display: flex; flex-direction: column; gap: 12px; }

  .risk-item {
    border-left: 3px solid transparent;
    padding: 14px 16px;
    background: var(--bg3);
    border-radius: 0 10px 10px 0;
  }

  .risk-item.high { border-color: var(--red); }
  .risk-item.medium { border-color: var(--orange); }
  .risk-item.low { border-color: var(--green); }

  .risk-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

  .risk-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    letter-spacing: 0.06em;
  }

  .high .risk-badge { background: rgba(224,92,92,0.15); color: var(--red); }
  .medium .risk-badge { background: rgba(224,138,60,0.15); color: var(--orange); }
  .low .risk-badge { background: rgba(76,174,126,0.15); color: var(--green); }

  .risk-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .risk-desc { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .risk-rec { font-size: 12px; color: var(--accent2); font-style: italic; }

  /* Key terms */
  .terms-list { display: flex; flex-direction: column; gap: 10px; }

  .term-item { padding: 14px; background: var(--bg3); border-radius: 10px; }
  .term-cat { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .term-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .term-desc { font-size: 13px; color: var(--text2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 16px 24px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 20px; font-family: var(--serif); color: var(--gold2); }
  .stat-label { font-size: 11px; color: var(--text3); }

  /* Error */
  .error-box {
    background: rgba(224,92,92,0.08);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 10px;
    padding: 20px 24px;
    margin-top: 24px;
    max-width: 560px;
    text-align: center;
  }
  .error-box h3 { color: var(--red); font-size: 15px; margin-bottom: 8px; }
  .error-box p { font-size: 13px; color: var(--text2); }

  /* Plain summary card */
  .plain-card {
    background: linear-gradient(135deg, rgba(124,106,247,0.08) 0%, rgba(201,168,76,0.06) 100%);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .plain-card .card-label { color: var(--accent2); }
  .plain-card .card-value { font-size: 15px; color: var(--text); line-height: 1.8; }

  /* Section headers */
  .section-title {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--text2);
    margin: 28px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .new-analysis-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 32px;
  }
  .new-analysis-btn:hover { border-color: var(--gold); color: var(--gold2); }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="logo-icon">⚖</div>
    <div class="logo-text">
      <h1>Lex Analytica</h1>
      <p>Юридический AI-помощник</p>
    </div>
  </header>
  <div class="main" id="main-content"></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  screen: 'upload', // upload | loading | result | error
  file: null,
  fileText: null,
  analysis: null,
  error: null,
  loadingStep: 0
};

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main-content');
  if (state.screen === 'upload') el.innerHTML = renderUpload();
  else if (state.screen === 'loading') el.innerHTML = renderLoading();
  else if (state.screen === 'result') el.innerHTML = renderResult();
  else if (state.screen === 'error') el.innerHTML = renderError();
  attachListeners();
}

// ─── Upload Screen ────────────────────────────────────────────────────────────
function renderUpload() {
  const hasFile = !!state.file;
  return `
    <div class="upload-section">
      <h2 class="upload-headline">Анализ юридических<br>документов с <span>AI</span></h2>
      <p class="upload-sub">Загрузите договор или юридический документ — AI выделит ключевые условия, риски и объяснит всё простым языком</p>

      <div class="drop-zone ${hasFile ? 'has-file' : ''}" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,.docx">
        <div class="drop-icon">📄</div>
        <div class="drop-title">${hasFile ? 'Нажмите чтобы заменить' : 'Перетащите файл сюда'}</div>
        <div class="drop-sub">${hasFile ? '' : 'или нажмите для выбора'}</div>
        <div class="drop-formats">
          <span class="format-badge">PDF</span>
          <span class="format-badge">DOCX</span>
          <span class="format-badge">до 10 МБ</span>
        </div>
      </div>

      ${hasFile ? `
        <div class="file-selected">
          <div class="file-icon">${state.file.name.endsWith('.pdf') ? '📕' : '📘'}</div>
          <div class="file-info">
            <div class="file-name">${escHtml(state.file.name)}</div>
            <div class="file-size">${formatSize(state.file.size)}</div>
          </div>
        </div>
        <button class="analyze-btn" id="analyze-btn">Анализировать документ →</button>
      ` : ''}

      ${state.error ? `
        <div class="error-box" style="margin-top:20px">
          <h3>Ошибка</h3>
          <p>${escHtml(state.error)}</p>
        </div>
      ` : ''}
    </div>
  `;
}

// ─── Loading Screen ───────────────────────────────────────────────────────────
function renderLoading() {
  const steps = [
    'Чтение документа...',
    'Извлечение текста...',
    'Отправка на анализ AI...',
    'Обработка результатов...'
  ];
  return `
    <div class="loading-section">
      <div class="spinner"></div>
      <div class="loading-text">Анализируем документ</div>
      <div class="loading-steps">
        ${steps.map((s, i) => `
          <div class="loading-step ${i < state.loadingStep ? 'done' : i === state.loadingStep ? 'active' : ''}">
            <div class="step-dot"></div>
            ${s}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ─── Result Screen ────────────────────────────────────────────────────────────
function renderResult() {
  const a = state.analysis;
  const riskCount = (a.risks || []).length;
  const highRisks = (a.risks || []).filter(r => r.level === 'high').length;
  const termCount = (a.key_terms || []).length;

  return `
    <div>
      <div class="results-header">
        <div>
          <div class="results-title">Анализ завершён</div>
          <div class="results-meta">📄 ${escHtml(state.file?.name || '')} · ${new Date().toLocaleDateString('ru-RU')}</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn-secondary" id="download-btn">⬇ Скачать отчёт</button>
          <button class="btn-secondary" id="new-btn">↩ Новый анализ</button>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat"><div class="stat-val">${riskCount}</div><div class="stat-label">рисков выявлено</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--red)">${highRisks}</div><div class="stat-label">высокого уровня</div></div>
        <div class="stat"><div class="stat-val">${termCount}</div><div class="stat-label">ключевых условий</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--gold2)">${escHtml(a.document_type || '—')}</div><div class="stat-label">тип документа</div></div>
      </div>

      ${a.plain_language_summary ? `
        <div class="plain-card">
          <div class="card-label">✦ Объяснение простым языком</div>
          <div class="card-value">${escHtml(a.plain_language_summary)}</div>
        </div>
      ` : ''}

      <div class="results-grid">
        ${a.summary ? `
          <div class="card card-full">
            <div class="card-label">Краткое описание</div>
            <div class="card-value">${escHtml(a.summary)}</div>
          </div>
        ` : ''}

        ${a.parties && a.parties.length ? `
          <div class="card">
            <div class="card-label">Стороны договора</div>
            <div class="parties-list">
              ${a.parties.map(p => `<span class="party-tag">${escHtml(p)}</span>`).join('')}
            </div>
          </div>
        ` : ''}
      </div>

      ${a.risks && a.risks.length ? `
        <div class="section-title">Выявленные риски</div>
        <div class="risks-list">
          ${a.risks.map(r => `
            <div class="risk-item ${r.level || 'medium'}">
              <div class="risk-header">
                <span class="risk-badge">${riskLabel(r.level)}</span>
                <span class="risk-title">${escHtml(r.title || '')}</span>
              </div>
              <div class="risk-desc">${escHtml(r.description || '')}</div>
              ${r.recommendation ? `<div class="risk-rec">→ ${escHtml(r.recommendation)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${a.key_terms && a.key_terms.length ? `
        <div class="section-title">Ключевые условия</div>
        <div class="terms-list">
          ${a.key_terms.map(t => `
            <div class="term-item">
              <div class="term-cat">${escHtml(t.category || '')}</div>
              <div class="term-title">${escHtml(t.title || '')}</div>
              <div class="term-desc">${escHtml(t.description || '')}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}

      <div style="display:flex;justify-content:center">
        <button class="new-analysis-btn" id="new-btn2">↩ Проанализировать другой документ</button>
      </div>
    </div>
  `;
}

// ─── Error Screen ─────────────────────────────────────────────────────────────
function renderError() {
  return `
    <div class="upload-section">
      <div class="error-box" style="max-width:500px">
        <h3>⚠ Ошибка анализа</h3>
        <p>${escHtml(state.error || 'Произошла неизвестная ошибка')}</p>
      </div>
      <button class="analyze-btn" style="margin-top:24px" id="retry-btn">Попробовать снова</button>
    </div>
  `;
}

// ─── Event Listeners ──────────────────────────────────────────────────────────
function attachListeners() {
  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');
  const analyzeBtn = document.getElementById('analyze-btn');
  const downloadBtn = document.getElementById('download-btn');
  const newBtn = document.getElementById('new-btn');
  const newBtn2 = document.getElementById('new-btn2');
  const retryBtn = document.getElementById('retry-btn');

  if (fileInput) {
    fileInput.onchange = e => {
      const f = e.target.files[0];
      if (f) handleFileSelect(f);
    };
  }

  if (dropZone) {
    dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) handleFileSelect(f);
    };
  }

  if (analyzeBtn) analyzeBtn.onclick = startAnalysis;
  if (downloadBtn) downloadBtn.onclick = downloadReport;
  if (newBtn) newBtn.onclick = resetApp;
  if (newBtn2) newBtn2.onclick = resetApp;
  if (retryBtn) retryBtn.onclick = resetApp;
}

// ─── File Handling ─────────────────────────────────────────────────────────────
function handleFileSelect(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf', 'docx'].includes(ext)) {
    state.error = 'Поддерживаются только файлы PDF и DOCX';
    render(); return;
  }
  if (file.size > 10 * 1024 * 1024) {
    state.error = 'Файл слишком большой. Максимальный размер — 10 МБ';
    render(); return;
  }
  state.file = file;
  state.error = null;
  render();
}

// ─── Analysis ─────────────────────────────────────────────────────────────────
async function startAnalysis() {
  if (!state.file) return;

  state.screen = 'loading';
  state.loadingStep = 0;
  render();

  try {
    // Step 1: Validate file
    state.loadingStep = 1; render();
    await new Promise(r => setTimeout(r, 300));

    // Step 2: Send file to backend (backend extracts text + runs AI)
    state.loadingStep = 2; render();
    const analysis = await analyzeWithClaude(null);

    // Step 3: Process
    state.loadingStep = 3; render();
    await new Promise(r => setTimeout(r, 600));

    state.analysis = analysis;
    state.screen = 'result';
    render();

  } catch (err) {
    console.error('[Analysis error]', err);
    state.error = err.message || 'Произошла ошибка при анализе';
    state.screen = 'error';
    render();
  }
}

// ─── File Text Extraction ──────────────────────────────────────────────────────
async function extractTextFromFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'docx') return extractDocx(file);
  if (ext === 'pdf') return extractPdf(file);
  throw new Error('Неподдерживаемый формат файла');
}

async function extractPdf(file) {
  // Load PDF.js from CDN
  if (!window.pdfjsLib) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const pages = [];

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    pages.push(pageText);
  }

  return pages.join('\n\n');
}

async function extractDocx(file) {
  // Load mammoth.js from CDN
  if (!window.mammoth) {
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js');
  }

  const arrayBuffer = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({ arrayBuffer });
  return result.value;
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error(`Не удалось загрузить: ${src}`));
    document.head.appendChild(s);
  });
}

// ─── Backend API ─────────────────────────────────────────────────────────────
const BACKEND_URL = 'http://localhost:8000';

async function analyzeWithClaude(text) {
  const formData = new FormData();
  formData.append('file', state.file);

  console.log('[API] Sending to backend:', state.file.name, state.file.size, 'bytes');

  let response;
  try {
    response = await fetch(`${BACKEND_URL}/api/upload`, {
      method: 'POST',
      body: formData
    });
  } catch (err) {
    console.error('[API] Network error:', err);
    throw new Error(
      `Не удалось подключиться к серверу (${BACKEND_URL}).\n` +
      `Убедитесь что Docker запущен: docker-compose up\n` +
      `Детали: ${err.message}`
    );
  }

  console.log('[API] Response status:', response.status);

  if (!response.ok) {
    let detail = `HTTP ${response.status}`;
    try { const err = await response.json(); detail = err.detail || JSON.stringify(err); } catch {}
    console.error('[API] Server error:', detail);
    throw new Error(`Ошибка сервера: ${detail}`);
  }

  const data = await response.json();
  console.log('[API] Success:', data);

  if (!data.success || !data.analysis) {
    throw new Error('Сервер вернул неожиданный ответ: ' + JSON.stringify(data));
  }

  return data.analysis;
}

// ─── Download Report ──────────────────────────────────────────────────────────
function downloadReport() {
  if (!state.analysis) return;

  const a = state.analysis;
  const lines = [];
  const d = new Date().toLocaleDateString('ru-RU');

  lines.push('ЮРИДИЧЕСКИЙ АНАЛИЗ ДОКУМЕНТА');
  lines.push('='.repeat(50));
  lines.push(`Файл: ${state.file?.name || '—'}`);
  lines.push(`Дата: ${d}`);
  lines.push('');

  if (a.document_type) {
    lines.push(`Тип документа: ${a.document_type}`);
    lines.push('');
  }

  if (a.parties?.length) {
    lines.push('СТОРОНЫ:');
    a.parties.forEach(p => lines.push(`  • ${p}`));
    lines.push('');
  }

  if (a.summary) {
    lines.push('КРАТКОЕ ОПИСАНИЕ:');
    lines.push(a.summary);
    lines.push('');
  }

  if (a.plain_language_summary) {
    lines.push('ОБЪЯСНЕНИЕ ПРОСТЫМ ЯЗЫКОМ:');
    lines.push(a.plain_language_summary);
    lines.push('');
  }

  if (a.risks?.length) {
    lines.push('РИСКИ:');
    lines.push('-'.repeat(40));
    a.risks.forEach(r => {
      const lvl = r.level === 'high' ? 'ВЫСОКИЙ' : r.level === 'medium' ? 'СРЕДНИЙ' : 'НИЗКИЙ';
      lines.push(`[${lvl}] ${r.title}`);
      lines.push(r.description);
      if (r.recommendation) lines.push(`Рекомендация: ${r.recommendation}`);
      lines.push('');
    });
  }

  if (a.key_terms?.length) {
    lines.push('КЛЮЧЕВЫЕ УСЛОВИЯ:');
    lines.push('-'.repeat(40));
    a.key_terms.forEach(t => {
      lines.push(`[${t.category}] ${t.title}`);
      lines.push(t.description);
      lines.push('');
    });
  }

  lines.push('='.repeat(50));
  lines.push('Сформировано юридическим AI-помощником Lex Analytica.');
  lines.push('Не является юридической консультацией.');

  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `legal_analysis_${Date.now()}.txt`;
  link.click();
  URL.revokeObjectURL(url);
}

function resetApp() {
  state.screen = 'upload';
  state.file = null;
  state.fileText = null;
  state.analysis = null;
  state.error = null;
  state.loadingStep = 0;
  render();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' Б';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' КБ';
  return (bytes / 1024 / 1024).toFixed(1) + ' МБ';
}

function riskLabel(level) {
  return level === 'high' ? 'ВЫСОКИЙ' : level === 'medium' ? 'СРЕДНИЙ' : 'НИЗКИЙ';
}
