services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lexanalytica
      POSTGRES_USER: lexuser
      POSTGRES_PASSWORD: lexpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexuser -d lexanalytica"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://lexuser:lexpass123@db:5432/lexanalytica
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral-nemo:12b
      - SECRET_KEY=change-this-in-production-use-long-random-string
      - SESSION_EXPIRE_HOURS=24
      - CORS_ORIGINS=http://localhost:5173,http://localhost:4173
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  uploads_data:
